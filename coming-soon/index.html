<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#04070f" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="DropSlim — Bilder klein machen auf dem Mac. Demnächst verfügbar."
    />
    <link rel="icon" href="favicon.png" type="image/png" sizes="32x32" />
    <title>DropSlim — Coming Soon</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        font-size: 1rem;
        line-height: 1.6;
        color: #e8e6df;
        background-color: #04070f;
        background-image:
          radial-gradient(ellipse 80% 60% at 50% -10%, hsl(210 100% 52% / 0.12), transparent),
          radial-gradient(ellipse 60% 50% at 100% 100%, hsl(220 60% 20% / 0.25), transparent);
        text-align: center;
      }

      main {
        max-width: 28rem;
      }

      .wordmark {
        margin: 0 0 2.5rem;
        font-size: clamp(1.75rem, 5vw, 2.25rem);
        font-weight: 800;
        letter-spacing: 0.025em;
      }

      .wordmark span {
        font-weight: 600;
        color: #b8b5ad;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
        line-height: 1.2;
        letter-spacing: 0.01em;
      }

      h1 em {
        font-style: normal;
        color: #0a84ff;
      }

      p {
        margin: 0 0 1rem;
        color: #b8b5ad;
        font-size: clamp(1rem, 2.5vw, 1.125rem);
      }

      .lang {
        margin-top: 2rem;
        padding-top: 2rem;
        border-top: 1px solid hsl(220 37% 16%);
        font-size: 0.9375rem;
        color: #8a8780;
      }

      a {
        color: #e8e6df;
        text-decoration: underline;
        text-underline-offset: 0.15em;
      }

      a:hover {
        color: #0a84ff;
      }

      .github {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.5rem;
        padding: 0.625rem 1.125rem;
        border: 1px solid hsl(0 0% 100% / 0.09);
        border-radius: 8px;
        background: hsl(222 56% 7% / 0.42);
        color: #e8e6df;
        text-decoration: none;
        font-size: 0.9375rem;
        transition:
          border-color 0.15s,
          color 0.15s;
      }

      .github:hover {
        border-color: hsl(0 0% 100% / 0.18);
        color: #0a84ff;
      }

      .github svg {
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="wordmark" aria-hidden="true">Drop<span>Slim</span></p>
      <h1>Demnächst <em>verfügbar</em>.</h1>
      <p>
        Bilder klein machen auf dem Mac — lokal, schnell, per Drag &amp; Drop. Kein Account, kein
        Server.
      </p>
      <a
        class="github"
        href="https://github.com/onza/DropSlim"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path
            d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"
          />
        </svg>
        GitHub
      </a>
      <p class="lang">Coming soon · macOS · open source</p>
    </main>
  </body>
</html>
