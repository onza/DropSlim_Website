name: Deploy Coming Soon (GitHub Pages)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'coming-soon/**'
      - '.github/workflows/deploy-coming-soon.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/upload-pages-artifact@v5
        with:
          path: coming-soon

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
